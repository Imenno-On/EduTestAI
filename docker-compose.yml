services:
  db:
    image: postgres:16-alpine
    container_name: edutestai-db
    environment:
      POSTGRES_USER: edutest
      POSTGRES_PASSWORD: edutest
      POSTGRES_DB: edutestai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: edutestai-minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data: