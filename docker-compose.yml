services:
  db:
    image: postgres:16-alpine
    container_name: edutestai-db
    environment:
      POSTGRES_USER: edutest
      POSTGRES_PASSWORD: edutest
      POSTGRES_DB: edutestai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: