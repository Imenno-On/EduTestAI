name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit and integration tests
        working-directory: frontend
        run: npm run test

      - name: Run frontend production build
        working-directory: frontend
        run: npm run build

  frontend-e2e:
    runs-on: ubuntu-latest
    needs:
      - frontend-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend E2E tests
        working-directory: frontend
        run: npm run test:e2e

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
      - frontend-e2e

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Validate docker compose file
        run: docker compose config

      - name: Build application images
        run: |
          for attempt in 1 2 3; do
            echo "Docker build attempt ${attempt}/3"
            if docker compose build; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Docker build failed, retrying in 15 seconds..."
              sleep 15
            fi
          done
          echo "Docker build failed after 3 attempts"
          exit 1
